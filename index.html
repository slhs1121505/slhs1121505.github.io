    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
    canvas#bg{position:fixed;inset:0;z-index:0;display:block}
    .wrap{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;z-index:3;padding:36px}
    .card{position:relative;overflow:hidden;border-radius:20px;padding:40px 44px;text-align:center;max-width:860px;width:100%;backdrop-filter:blur(10px);background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);box-shadow:0 12px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.02);}
    .avatar{width:140px;height:140px;margin:0 auto;border-radius:999px;overflow:hidden;display:grid;place-items:center;background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.06);box-shadow:0 6px 20px rgba(0,0,0,0.6)}
    .avatar img{width:100%;height:100%;object-fit:cover;display:block}
    h1{margin:18px 0 6px;font-size:32px;letter-spacing:0.4px}
    .handles{font-size:13px;color:var(--muted);margin-bottom:8px}
    p.bio{margin:0 0 20px;color:var(--muted);line-height:1.45;font-size:15px}
    .links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:10px}
    .link{width:58px;height:58px;border-radius:14px;display:inline-grid;place-items:center;text-decoration:none;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);transition:transform .22s,box-shadow .22s;color:var(--fg)}
    .link:focus{outline:2px solid rgba(255,255,255,0.06);outline-offset:4px}
    .link svg{width:22px;height:22px;display:block}
    .link:hover{transform:translateY(-8px) scale(1.06);box-shadow:0 18px 50px rgba(255,255,255,0.03)}
    .sub{margin-top:12px;color:var(--muted);font-size:13px}
    footer{position:fixed;right:18px;bottom:18px;color:var(--muted);font-size:12px}
    @media (max-width:520px){.card{padding:22px}.avatar{width:110px;height:110px}.links{gap:10px}}

  <script>
    const c = document.getElementById('bg'); const ctx = c.getContext('2d');
    let W = innerWidth, H = innerHeight, DPR = devicePixelRatio || 1;
    const bloomC = document.createElement('canvas'); const bloomCtx = bloomC.getContext('2d');
    function resize(){W = innerWidth; H = innerHeight; DPR = devicePixelRatio || 1; c.width = Math.round(W * DPR); c.height = Math.round(H * DPR); c.style.width = W + 'px'; c.style.height = H + 'px'; ctx.setTransform(DPR,0,0,DPR,0,0); bloomC.width = c.width; bloomC.height = c.height; bloomC.style.width = W + 'px'; bloomC.style.height = H + 'px'; bloomCtx.setTransform(DPR,0,0,DPR,0,0); ctx.imageSmoothingEnabled = true; bloomCtx.imageSmoothingEnabled = true;}resize();addEventListener('resize',resize);

    const spriteSize = 48; const sp = document.createElement('canvas'); sp.width = spriteSize; sp.height = spriteSize; const sctx = sp.getContext('2d');
    function makeSprite(){ sctx.clearRect(0,0,spriteSize,spriteSize); const cx = spriteSize/2, cy = spriteSize/2; const g = sctx.createRadialGradient(cx,cy,0,cx,cy,spriteSize/2); g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(0.25,'rgba(255,255,255,0.45)'); g.addColorStop(0.55,'rgba(255,255,255,0.12)'); g.addColorStop(1,'rgba(255,255,255,0)'); sctx.fillStyle = g; sctx.fillRect(0,0,spriteSize,spriteSize);} makeSprite();

    const layers = [{count:160,size:0.9,alpha:0.95,spd:0.9},{count:100,size:1.6,alpha:0.78,spd:1.6},{count:50,size:2.4,alpha:0.55,spd:2.6}];
    let particles = [];
    function seed(){particles=[]; const maxRad = Math.min(W,H)*0.46; for(let L=0;L<layers.length;L++){const layer=layers[L]; for(let i=0;i<layer.count;i++){const ang = Math.random()*Math.PI*2; const rad = Math.random()*maxRad; const x = W/2 + Math.cos(ang)*rad; const y = H/2 + Math.sin(ang)*rad; particles.push({x,y,vx:0,vy:0,rad,ang,size:layer.size*(0.9+Math.random()*0.25),alpha:layer.alpha,spd:layer.spd,noise:Math.random()*10,layer:L})}}}
    seed();

    const markers = [ {x:W*0.25,y:H*0.35,ox:W*0.25,oy:H*0.35},{x:W*0.75,y:H*0.4,ox:W*0.75,oy:H*0.4},{x:W*0.5,y:H*0.72,ox:W*0.5,oy:H*0.72}];
    let mouse = {x:-9999,y:-9999}; addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY}); addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999});
    let disturbance = 0;

    function drawBackground(){ ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H); const g = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.02,W/2,H/2,Math.max(W,H)); g.addColorStop(0,'rgba(255,255,255,0.006)'); g.addColorStop(1,'rgba(255,255,255,0)'); ctx.fillStyle = g; ctx.fillRect(0,0,W,H); }

    function loop(nowMS){ const now = nowMS/1000; disturbance *= 0.92; if(disturbance < 0.00001) disturbance = 0; // clear
      drawBackground(); bloomCtx.clearRect(0,0,W,H);

      const cx = W/2, cy = H/2;
      // draw base sprites to main and bright sprites to bloom ctx
      for(let p of particles){
        const dx = p.x - cx, dy = p.y - cy; const dist = Math.hypot(dx,dy) + 0.0001; const tx = -dy/dist, ty = dx/dist; const base = p.spd * (1 + 0.2 * (p.layer || 0)); const spring = (p.rad - dist) * 0.02;
        let mx = 0, my = 0; const mdx = p.x - mouse.x, mdy = p.y - mouse.y, md = Math.hypot(mdx,mdy);
        if(mouse.x>-9000 && md < 160){ const f = (1 - md/160) * 5; mx = (mdx/md) * f; my = (mdy/md) * f; disturbance = Math.min(1, disturbance + 0.06); }
        for(let m of markers){ const mdx2 = p.x - m.x, mdy2 = p.y - m.y, md2 = Math.hypot(mdx2,mdy2); if(md2 < 150){ const f=(1 - md2/150) * 2.2; mx += (mdx2/md2) * f; my += (mdy2/md2) * f; disturbance = Math.min(1, disturbance + 0.008); }}
        const noise = Math.sin(now*0.9 + p.noise) * 0.06;
        p.vx = p.vx*0.86 + tx * base * (1 + noise) + (dx/dist) * spring * 6 + mx + (Math.random()-0.5) * (disturbance*0.7);
        p.vy = p.vy*0.86 + ty * base * (1 + noise) + (dy/dist) * spring * 6 + my + (Math.random()-0.5) * (disturbance*0.7);
        p.x += p.vx * 0.6; p.y += p.vy * 0.6; const ndx = p.x - cx, ndy = p.y - cy; p.rad = Math.hypot(ndx,ndy);
        if(p.x < -40) p.x = W+40; if(p.x > W+40) p.x = -40; if(p.y < -40) p.y = H+40; if(p.y > H+40) p.y = -40;

        ctx.globalCompositeOperation = 'screen'; ctx.globalAlpha = Math.min(1, p.alpha * 0.08); const drawSize = p.size * 6; ctx.drawImage(sp, p.x - drawSize/2, p.y - drawSize/2, drawSize, drawSize);
        bloomCtx.globalCompositeOperation = 'lighter'; bloomCtx.globalAlpha = Math.min(1, p.alpha * 0.32); bloomCtx.drawImage(sp, p.x - drawSize/2, p.y - drawSize/2, drawSize, drawSize);
      }

      ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 1; ctx.filter = 'blur(14px)'; ctx.drawImage(bloomC, 0, 0, W, H); ctx.filter = 'none'; ctx.restore();

      for(let m of markers){ const mdx = m.x - mouse.x, mdy = m.y - mouse.y, md = Math.hypot(mdx,mdy);
        if(mouse.x>-9000 && md < 200){ const f=(1-md/200)*8; m.x += (mdx/md)*f; m.y += (mdy/md)*f; disturbance = Math.min(1, disturbance + 0.02); }
        else { m.x += (m.ox - m.x) * 0.06; m.y += (m.oy - m.y) * 0.06; const dorg = Math.hypot(m.x - m.ox, m.y - m.oy); if(dorg < 3) disturbance *= 0.88; } }

      requestAnimationFrame(loop);
    }

    addEventListener('resize', ()=>{seed(); markers[0].ox = W*0.25; markers[0].oy = H*0.35; markers[1].ox = W*0.75; markers[1].oy = H*0.4; markers[2].ox = W*0.5; markers[2].oy = H*0.72; markers.forEach(m=>{m.x=m.ox; m.y=m.oy});});

    setTimeout(()=>{ for(let i=0;i<4;i++){const x=Math.random()*W,y=Math.random()*H; for(let p of particles){const dx=p.x-x,dy=p.y-y,dist=Math.hypot(dx,dy); if(dist<260){const f=(260-dist)/260; p.vx += (dx/dist)*f*2; p.vy += (dy/dist)*f*2;}} }},160);

    requestAnimationFrame(loop);
  </script>
